<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tlias智能学习辅助系统</title>
  <style>
    /* 清除默认内外边距 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 导航栏样式 */
    .nav {
      width: 100%;
      height: 60px;
      background-color: #cccccc;
      /* 灰色背景 */
      display: flex;
      /* 左右两端对齐 */
      justify-content: space-between;
      /* 垂直居中 */
      align-items: center;
      /* 左右内边距 */
      padding: 0 30px;
    }

    /* 项目标题样式 */
    .nav-title {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      /* 设置字体为楷体 */
      font-family: "楷体";
    }

    /* 退出登录链接样式 */
    .logout-link {
      font-size: 18px;
      color: #0066cc;
      text-decoration: none;
    }

    /* 鼠标悬浮链接变色 */
    .logout-link:hover {
      color: #ff4444;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <!-- 第一部分：导航栏 -->
  <div class="nav">
    <div class="nav-title">tlias智能学习辅助系统</div>
    <a href="#" class="logout-link">退出登录</a>
  </div>

  <!-- 下面预留另外三部分区域，后续可自行填充内容 -->
  <div class="part2">第二部分内容区域</div>
  <div class="part3">第三部分内容区域</div>
  <div class="part4">第四部分内容区域</div>
</body>

</html>
