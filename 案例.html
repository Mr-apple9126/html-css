<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tlias智能学习辅助系统</title>
  <style>
    /* 清除默认内外边距 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 导航栏样式 */
    .nav {
      width: 100%;
      height: 60px;
      background-color: #cccccc;
      /* 灰色背景 */
      display: flex;
      /* 左右两端对齐 */
      justify-content: space-between;
      /* 垂直居中 */
      align-items: center;
      /* 左右内边距 */
      padding: 0 30px;
    }

    /* 项目标题样式 */
    .nav-title {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      /* 设置字体为楷体 */
      font-family: "楷体";
    }

    /* 退出登录链接样式 */
    .logout-link {
      font-size: 18px;
      color: #0066cc;
      text-decoration: none;
    }

    /* 鼠标悬浮链接变色 */
    .logout-link:hover {
      color: #ff4444;
      text-decoration: underline;
    }

    .search-form {
      display: flex;
      align-items: center;
      gap: 16px;
      /* 统一间距，美观 */
      padding: 18px 24px;
      background-color: #f8f9fa;
      border-radius: 8px;
      max-width: 100%;
      margin: 20px 0;
    }

    /* 每个表单项组 */
    .form-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 400px;
    }

    /* 标签文字统一样式 */
    .form-item label {
      font-size: 15px;
      color: #333;
      white-space: nowrap;
      /* 文字不换行 */
    }

    /* 输入框、下拉框统一样式 */
    .form-item input,
    .form-item select {
      width: 140px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    /* 输入框聚焦高亮 */
    .form-item input:focus,
    .form-item select:focus {
      border-color: #409eff;
    }

    /* 按钮样式区分 */
    .btn-search {
      height: 36px;
      padding: 0 20px;
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-reset {
      height: 36px;
      padding: 0 20px;
      background: #fff;
      color: #606266;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-search:hover {
      background: #66b1ff;
    }

    .btn-reset:hover {
      border-color: #c0c4cc;
    }
  </style>
</head>

<body>
  <!-- 第一部分：导航栏 -->
  <div class="nav">
    <div class="nav-title">tlias智能学习辅助系统</div>
    <a href="#" class="logout-link">退出登录</a>
  </div>
  <!-- 搜索表单区域 -->
  <form class="search-form" action="search" method="post">
    <!-- 1.姓名文本框 -->
    <div class="form-item">
      <label for="username">姓名：</label>
      <input type="text" id="username" name="username" placeholder="请输入姓名">
    </div>

    <!-- 2.性别下拉框，默认空 -->
    <div class="form-item">
      <label>性别：</label>
      <select name="gender">
        <option value="">请选择性别</option>
        <option value="1">男</option>
        <option value="2">女</option>
      </select>
    </div>

    <!-- 3.职位下拉框，默认空 -->
    <div class="form-item">
      <label>职位：</label>
      <select name="position">
        <option value="">请选择职位</option>
        <option value="teacher">班主任</option>
        <option value="lecturer">讲师</option>
        <option value="studentManager">学工主管</option>
        <option value="researchManager">教研主管</option>
        <option value="consultant">咨询师</option>
      </select>
    </div>

    <!-- 操作按钮 -->
    <div class="form-btn-group">
      <button type="submit" class="btn-search">查询</button>
      <button type="reset" class="btn-reset">清空</button>
    </div>
  </form>
</body>

</html>
